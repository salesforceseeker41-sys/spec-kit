id: APEX-001
title: No SOQL or DML in Loops
category: Apex
description: Apex should avoid SOQL and DML statements inside loops.
rationale: Loop-based data operations can exceed governor limits in bulk execution.
severity: advisory
default_enabled: true
applies_to:
  - plan
  - apex
keywords:
  - SOQL
  - DML
  - loop
  - maps
  - sets
recommendation: Describe query and DML strategy outside loops using collections, maps, or sets.
references:
  - Salesforce Apex Best Practices
owner: Platform Team
version: "1.0"
