id: COMP-005
title: Reporting Evidence
category: Compliance
description: Compliance-sensitive features must identify reports, dashboards, or exports used as evidence.
rationale: Auditors and business owners need reliable evidence sources for control operation.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
keywords:
  - report
  - dashboard
  - evidence
  - export
recommendation: Identify authoritative evidence outputs and their ownership, refresh cadence, and access model.
references:
  - Salesforce Reports and Dashboards Documentation
owner: Platform Team
version: "1.0"
