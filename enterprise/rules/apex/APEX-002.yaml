id: APEX-002
title: Selector Query Encapsulation
category: Apex
description: Reusable query logic should be encapsulated rather than duplicated across Apex classes.
rationale: Query encapsulation improves consistency, field access review, and limit management.
severity: advisory
default_enabled: true
applies_to:
