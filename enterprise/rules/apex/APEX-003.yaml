id: APEX-003
title: Apex Test Data Isolation
category: Apex
description: Apex tests must create isolated test data and avoid relying on org data.
rationale: Isolated tests remain stable across sandboxes, packages, and production deployments.
severity: advisory
default_enabled: true
applies_to:
  - apex
  - testing
keywords:
  - test data
  - SeeAllData
  - factory
  - isolation
recommendation: Use test data factories and avoid SeeAllData unless a documented exception exists.
references:
  - Salesforce Apex Testing Best Practices
owner: Platform Team
version: "1.0"
