id: FLOW-001
title: Flow Ownership and Type
category: Flow
description: Feature plans must identify flow type, owner, and invocation path for declarative automation.
rationale: Flow ownership prevents unmanaged automation sprawl and unclear support paths.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - flow
keywords:
  - flow
  - record-triggered flow
  - screen flow
  - owner
recommendation: Document flow type, entry condition, owner, and support responsibility.
references:
  - Salesforce Flow Best Practices
owner: Platform Team
version: "1.0"
practice:
  type: salesforce_flow_maintainability
  min_confidence: 0.7
required_evidence:
  - explains flow ownership
  - avoids excessive automation overlap
  - handles errors
  - includes flow tests
negative_evidence:
  - duplicate automation
  - no fault path
evidence_terms:
  explains flow ownership:
    - flow owner
    - automation owner
    - flow responsibility
  avoids excessive automation overlap:
    - automation overlap
    - single automation path
    - avoids duplicate automation
  handles errors:
    - fault path
    - error handling
    - fault connector
  includes flow tests:
    - flow test
    - flow tests
    - test scenario
  duplicate automation:
    - duplicate automation
    - multiple flows on same object
  no fault path:
    - no fault path
    - missing fault path
