id: SFSEC-006
title: Prefer inherited sharing For Service Apex
category: Salesforce Security
description: Apex service classes that operate in user-driven flows should use `inherited sharing` unless a stronger or explicitly justified sharing mode is required.
rationale: Inherited sharing makes caller context explicit and reduces accidental privilege escalation.
severity: warning
default_enabled: true
applies_to: [plan, apex]
keywords: [inherited sharing, with sharing, without sharing, Apex sharing, user context]
recommendation: Use `inherited sharing` for service classes and document why `without sharing` is required when used.
references: [Salesforce Apex Developer Guide, Salesforce Secure Coding Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Sharing declaration is shown for Apex entry points and services.
  - User-context versus system-context behavior is explained.
  - Any `without sharing` usage has an approved rationale.
negative_evidence:
  - Class omits sharing declaration.
  - Service layer uses `without sharing` for convenience.
  - Design relies on inherited behavior without stating it.
examples:
  compliant: AccountService is declared inherited sharing and is invoked by with-sharing controllers.
  non_compliant: CaseEscalationService uses without sharing to avoid access errors without security approval.
