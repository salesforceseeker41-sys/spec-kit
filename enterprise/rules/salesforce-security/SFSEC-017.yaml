id: SFSEC-017
title: Restrict Guest User Access
category: Salesforce Security
description: Guest user access for Experience Cloud or public sites must be minimized, explicitly approved, and limited to public data and public operations.
rationale: Guest users are unauthenticated and can expose data or business actions to the internet if misconfigured.
severity: blocking
default_enabled: true
applies_to: [specification, plan, flow, apex, metadata, deployment]
keywords: [guest user, Experience Cloud, public site, unauthenticated, guest profile]
recommendation: Avoid guest access for sensitive operations and require security approval for any guest-readable object, field, Apex class, or Flow.
references: [Salesforce Experience Cloud Security Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Public access use case is documented.
  - Guest profile object, field, Apex, and Flow access are listed.
  - Data exposure review and approval are recorded.
negative_evidence:
  - Guest user can access non-public records.
  - Guest profile has broad object permissions.
  - Public form writes records without abuse controls.
examples:
  compliant: Guest form creates a limited Lead record through validated Apex with no record readback.
  non_compliant: Guest profile has read access to Case records for status lookup without authentication.
