id: SFSEC-050
title: Require Security Exception Records
category: Salesforce Security
description: Any approved deviation from Salesforce security rules must be documented with risk, owner, compensating controls, approval, and expiration date.
rationale: Security exceptions must be visible, time-bound, and reviewable to prevent permanent unmanaged risk.
severity: blocking
default_enabled: true
applies_to: [specification, plan, deployment, operations]
keywords: [security exception, waiver, compensating control, risk acceptance, expiration]
recommendation: Record exceptions in the product exception register and review them before expiration or release.
references: [Enterprise Governance Constitution, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Rule being waived is identified.
  - Risk, compensating controls, owner, and expiry are documented.
  - Enterprise approval is linked.
negative_evidence:
  - Design says exception approved without evidence.
  - Exception has no expiration.
  - Compensating controls are vague or unowned.
examples:
  compliant: Temporary guest user exception expires after 60 days and includes monitoring plus remediation owner.
  non_compliant: Product proceeds with broad guest access because the launch date is fixed.
