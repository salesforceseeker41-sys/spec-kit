id: SFSEC-039
title: Protect Against CSRF In Custom Endpoints
category: Salesforce Security
description: Custom Salesforce endpoints and pages that perform state-changing operations must use platform CSRF protections or equivalent anti-forgery controls.
rationale: CSRF can trick authenticated users into performing unintended actions.
severity: warning
default_enabled: true
applies_to: [specification, plan, apex, metadata]
keywords: [CSRF, anti-forgery, state changing, Visualforce, endpoint]
recommendation: Use standard platform forms and controllers where possible and document anti-CSRF controls for custom endpoints.
references: [Salesforce Secure Coding Guide, Visualforce Developer Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - State-changing endpoints are identified.
  - Anti-CSRF mechanism is documented.
  - Same-origin and authentication assumptions are reviewed.
negative_evidence:
  - GET request performs a data change.
  - Custom endpoint lacks anti-forgery protection.
  - Design assumes authentication alone prevents CSRF.
examples:
  compliant: Visualforce action uses platform view state protections and POST-only state changes.
  non_compliant: Public link invokes an Apex endpoint that updates a record via GET.
