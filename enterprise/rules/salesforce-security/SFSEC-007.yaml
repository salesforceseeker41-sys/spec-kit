id: SFSEC-007
title: Justify Every without sharing Class
category: Salesforce Security
description: "Any Apex class declared `without sharing` must have a documented business need, compensating controls, test coverage, and enterprise security approval."
rationale: "`without sharing` bypasses record sharing and can expose or mutate records beyond the user's authorization."
severity: blocking
default_enabled: true
applies_to: [plan, apex, testing]
keywords: [without sharing, bypass sharing, privileged Apex, system context]
recommendation: Avoid `without sharing` unless implementing an approved privileged operation with narrow scope and explicit checks.
references: [Salesforce Apex Developer Guide, Salesforce Secure Coding Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Business justification for system-context access.
  - Compensating CRUD/FLS and record-scope controls.
  - Security approval or exception reference.
negative_evidence:
  - "`without sharing` used to simplify queries."
  - No limit on records affected by privileged code.
  - Tests only run as admin.
examples:
  compliant: Privileged reassignment job uses without sharing with scoped queue ownership checks and approved exception.
  non_compliant: LWC controller uses without sharing so all users can search all Accounts.
