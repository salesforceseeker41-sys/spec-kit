id: SFSEC-002
title: Enforce Field-Level Security Before Field Access
category: Salesforce Security
description: Designs must explain how field-level security is enforced before sensitive or restricted fields are read, displayed, changed, exported, or sent to external systems.
rationale: Field-level security protects sensitive data even when a user has access to the parent object or record.
severity: blocking
default_enabled: true
applies_to: [specification, plan, apex, flow, lwc, integration]
keywords: [FLS, field-level security, field permission, accessible, updateable, stripInaccessible]
recommendation: Use platform-enforced access paths, `Security.stripInaccessible`, describe calls, or equivalent checks for every protected field.
references: [Salesforce Apex Developer Guide, Salesforce Secure Coding Guide, Salesforce Lightning Web Components Developer Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Sensitive fields are identified.
  - Read and write FLS enforcement is described.
  - UI and API exposure paths are covered.
negative_evidence:
  - LWC displays fields returned by Apex without FLS enforcement.
  - Apex writes restricted fields without update permission checks.
  - Integration payload includes fields without FLS review.
examples:
  compliant: Apex strips inaccessible Contact fields before returning data to LWC.
  non_compliant: LWC receives and renders all queried Contact fields from a system-context Apex method.
