id: SFSEC-041
title: Secure Platform Events And Event Payloads
category: Salesforce Security
description: Platform Events, Change Data Capture, and event-driven integrations must avoid unnecessary sensitive data and define subscriber authorization, replay, and retention controls.
rationale: Event payloads can be replicated to multiple subscribers and are harder to retract once published.
severity: warning
default_enabled: true
applies_to: [specification, plan, apex, integration, operations]
keywords: [Platform Event, Change Data Capture, event payload, replay, subscriber]
recommendation: Publish identifiers and minimal required fields, validate subscriber access, and avoid regulated data unless approved.
references: [Salesforce Platform Events Documentation, Salesforce Change Data Capture Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Event payload fields are listed.
  - Sensitive data exposure is assessed.
  - Subscriber permissions and replay behavior are documented.
negative_evidence:
  - Event includes full customer or payment payload.
  - Any subscriber can consume sensitive events.
  - Replay retention risk is ignored.
examples:
  compliant: Order event publishes OrderId and status while subscribers query details through authorized APIs.
  non_compliant: Platform Event broadcasts full customer profile including regulated fields.
