id: SFSEC-018
title: Protect Public Forms Against Abuse
category: Salesforce Security
description: Public Salesforce forms and unauthenticated endpoints must include bot, spam, validation, rate, and operational monitoring controls.
rationale: Public entry points can be abused for spam, denial of service, data poisoning, or fraudulent record creation.
severity: warning
default_enabled: true
applies_to: [specification, plan, flow, apex, integration, operations]
keywords: [public form, bot protection, rate limit, CAPTCHA, validation, abuse]
recommendation: Use approved bot mitigation, strict validation, throttling where available, and monitoring for unexpected submission patterns.
references: [Salesforce Experience Cloud Security Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Public endpoint or form is identified.
  - Abuse scenarios and mitigations are documented.
  - Monitoring and response owner are assigned.
negative_evidence:
  - Anonymous users can submit unlimited records.
  - No validation beyond required fields.
  - Operations team has no alert for submission spikes.
examples:
  compliant: Public lead form uses CAPTCHA, server-side validation, duplicate checks, and alerting.
  non_compliant: Guest Flow creates Cases directly with free-form fields and no abuse monitoring.
