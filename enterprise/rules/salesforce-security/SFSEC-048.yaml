id: SFSEC-048
title: Protect External Services And Schema Imports
category: Salesforce Security
description: External Services, OpenAPI schemas, and generated invocable actions must be reviewed for authentication, data exposure, least privilege, and schema trust.
rationale: Generated integrations can expose external operations to Flow or users without enough security review.
severity: warning
default_enabled: true
applies_to: [specification, plan, flow, integration, metadata]
keywords: [External Services, OpenAPI, schema import, invocable action, Flow integration]
recommendation: Review imported schemas, restrict who can invoke generated actions, and route authentication through Named Credentials.
references: [Salesforce External Services Documentation, Salesforce Named Credentials Documentation]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Imported schema source and version are documented.
  - Authentication and Named Credential are identified.
  - Flow invocation permissions are controlled.
negative_evidence:
  - Unreviewed OpenAPI schema is imported into production.
  - Any Flow builder can invoke sensitive external operation.
  - Generated action exposes sensitive payloads without review.
examples:
  compliant: Approved payment API schema is version-pinned and invocable actions are limited to a secured Flow.
  non_compliant: Vendor OpenAPI schema is imported directly and exposed to all Flow authors.
