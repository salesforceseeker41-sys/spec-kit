id: SFSEC-001
title: Enforce CRUD Before Object Access
category: Salesforce Security
description: Designs must state how Salesforce object-level create, read, update, and delete permissions are enforced before Apex, Flow, or integration logic accesses records.
rationale: Object permissions are the first authorization boundary for Salesforce data and prevent users or integrations from performing unauthorized operations.
severity: blocking
default_enabled: true
applies_to: [specification, plan, apex, flow, integration]
keywords: [CRUD, object permission, authorization, createable, updateable, deleteable, accessible]
recommendation: Check object permissions explicitly or use platform features that enforce CRUD before reading or mutating Salesforce records.
references: [Salesforce Apex Developer Guide, Salesforce Secure Coding Guide, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Objects touched by the feature are listed.
  - Required object permissions are identified for each operation.
  - Enforcement mechanism is documented for Apex, Flow, and integrations.
negative_evidence:
  - Apex performs DML without checking object permissions.
  - Flow or integration assumes admin-equivalent access.
  - Design says permissions are handled later.
examples:
  compliant: Service layer checks Schema.sObjectType.Account.isUpdateable before update and denies unauthorized users.
  non_compliant: Apex controller updates Account records for any authenticated user without object permission checks.
