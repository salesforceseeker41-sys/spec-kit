id: SFSEC-012
title: Use OAuth Flows Approved For The Integration Pattern
category: Salesforce Security
description: Connected Apps and external integrations must use OAuth flows approved for the client type, trust boundary, and user interaction model.
rationale: Inappropriate OAuth flows can expose refresh tokens, over-privilege clients, or bypass enterprise identity controls.
severity: blocking
default_enabled: true
applies_to: [specification, plan, integration, deployment]
keywords: [OAuth, Connected App, authorization code, JWT bearer, client credentials, refresh token]
recommendation: Select the OAuth flow through architecture review and document token lifetime, scopes, callback handling, and client type.
references: [Salesforce OAuth Documentation, Salesforce Connected Apps Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - OAuth flow and client type are documented.
  - Token scopes and lifetimes are justified.
  - Callback, redirect, and token storage controls are described.
negative_evidence:
  - Password grant is used for server integration without approval.
  - Refresh tokens are stored outside approved secret storage.
  - OAuth scopes are broader than required.
examples:
  compliant: Server-to-server integration uses JWT bearer flow with certificate rotation and minimal scopes.
  non_compliant: Middleware stores an admin username and password to request access tokens.
