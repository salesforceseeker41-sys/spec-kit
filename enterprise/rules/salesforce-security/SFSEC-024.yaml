id: SFSEC-024
title: Use Event Monitoring For High-Risk Access
category: Salesforce Security
description: High-risk Salesforce access patterns must define Event Monitoring coverage for login, API, report export, URI, Lightning, or transaction events as appropriate.
rationale: Event Monitoring provides visibility into suspicious activity and supports detection and response.
severity: warning
default_enabled: true
applies_to: [specification, plan, integration, operations]
keywords: [Event Monitoring, login event, API event, report export, transaction security]
recommendation: Map high-risk access to relevant event types and document alerting, review cadence, and response ownership.
references: [Salesforce Event Monitoring Documentation, Salesforce Shield Documentation]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - High-risk activities are identified.
  - Event types and detection logic are documented.
  - Operations owner and alert path are assigned.
negative_evidence:
  - Bulk data export has no monitoring.
  - API integration activity is invisible to operations.
  - Event Monitoring is assumed but not configured.
examples:
  compliant: Sensitive report exports are monitored through ReportEvent with alerts to Security Operations.
  non_compliant: New integration can query customer records at scale with no API event monitoring.
