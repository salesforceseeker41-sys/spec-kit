id: SFSEC-042
title: Secure Report And Dashboard Data Exposure
category: Salesforce Security
description: Reports, dashboards, subscriptions, and exports must be reviewed for running user, folder sharing, row-level visibility, and sensitive field exposure.
rationale: Analytics assets can expose data broadly through folder access, subscriptions, exports, or elevated running users.
severity: warning
default_enabled: true
applies_to: [specification, plan, metadata, operations]
keywords: [report, dashboard, running user, folder sharing, export, subscription]
recommendation: Use least-privilege folder access and validate running-user implications for each dashboard.
references: [Salesforce Reports and Dashboards Security Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Report/dashboard audience is identified.
  - Running user and folder sharing are documented.
  - Export and subscription risks are assessed.
negative_evidence:
  - Dashboard runs as admin for broad audience.
  - Sensitive reports are in public folders.
  - Export capability is not reviewed.
examples:
  compliant: Executive dashboard running user and folder access are approved for the exact audience.
  non_compliant: Public report folder contains customer PII report exportable by all internal users.
