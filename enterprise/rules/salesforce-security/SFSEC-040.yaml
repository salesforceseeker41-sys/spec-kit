id: SFSEC-040
title: Protect File Uploads And Content Access
category: Salesforce Security
description: Features that upload, generate, share, or expose Salesforce Files must define file type, size, visibility, scanning, sharing, and retention controls.
rationale: Files can contain malware, regulated data, or sensitive content and often have different sharing behavior than records.
severity: warning
default_enabled: true
applies_to: [specification, plan, apex, flow, lwc, operations]
keywords: [Salesforce Files, ContentDocument, file upload, malware, file sharing]
recommendation: Restrict accepted file types, control file visibility, scan where required, and document file ownership and retention.
references: [Salesforce Files Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - File types, size limits, and storage objects are identified.
  - Sharing and visibility model is documented.
  - Malware or content scanning requirements are assessed.
negative_evidence:
  - Any file type is accepted from unauthenticated users.
  - Files inherit unintended broad visibility.
  - File retention is unspecified.
examples:
  compliant: Authenticated users upload PDF documents with size/type validation and restricted record-linked visibility.
  non_compliant: Guest users upload arbitrary executable files to public records.
