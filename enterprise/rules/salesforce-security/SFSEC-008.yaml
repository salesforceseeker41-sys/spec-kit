id: SFSEC-008
title: Run Security Tests With Least-Privilege Users
category: Salesforce Security
description: Security-sensitive Apex and automation must include tests that run as least-privilege users and verify denied access paths.
rationale: Admin-only tests hide authorization defects that appear in production user profiles and permission sets.
severity: warning
default_enabled: true
applies_to: [plan, apex, flow, testing]
keywords: [runAs, least privilege test, negative test, permission test, security test]
recommendation: Create representative test users with minimum permissions and assert both allowed and denied behavior.
references: [Salesforce Apex Developer Guide, Salesforce Secure Coding Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Least-privilege persona is identified.
  - Denied CRUD, FLS, or sharing behavior is tested.
  - Positive and negative access scenarios are covered.
negative_evidence:
  - All tests use default system context.
  - No test proves access denial.
  - Security behavior is manually tested only.
examples:
  compliant: Tests create a standard user with limited permission sets and verify restricted field updates fail.
  non_compliant: Tests insert and update all records as the implicit test-running user.
