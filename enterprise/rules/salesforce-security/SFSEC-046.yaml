id: SFSEC-046
title: Require Secure Error Handling
category: Salesforce Security
description: User-facing errors, API responses, and logs must not expose stack traces, internal object names, credentials, implementation details, or sensitive data.
rationale: Verbose errors can disclose information useful for attacks or leak protected data.
severity: warning
default_enabled: true
applies_to: [specification, plan, apex, flow, lwc, integration]
keywords: [error handling, stack trace, information disclosure, exception, user message]
recommendation: Return safe user messages, log redacted diagnostic details, and use correlation IDs for support.
references: [Salesforce Secure Coding Guide, Salesforce Apex Developer Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Error paths are identified.
  - User-facing and operational messages are separated.
  - Sensitive data redaction is documented.
negative_evidence:
  - Stack trace shown to end user.
  - API returns raw exception messages.
  - Error payload includes credentials or sensitive fields.
examples:
  compliant: LWC displays a generic failure message with support reference while Apex logs redacted details.
  non_compliant: REST API returns full Apex exception stack and SOQL query to caller.
