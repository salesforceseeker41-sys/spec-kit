id: SFSEC-010
title: Do Not Store Secrets In Apex Or Unprotected Metadata
category: Salesforce Security
description: Passwords, API keys, client secrets, tokens, private keys, and signing materials must not be stored in Apex, Custom Metadata, unprotected Custom Settings, labels, static resources, or source control.
rationale: Unprotected metadata and source-controlled files can expose secrets to developers, admins, packages, or downstream tooling.
severity: blocking
default_enabled: true
applies_to: [specification, plan, apex, metadata, deployment]
keywords: [secret, API key, client secret, token, password, private key]
recommendation: Store secrets in approved Salesforce credential features or enterprise secret management platforms and reference them indirectly.
references: [Salesforce Security Guide, Salesforce Named Credentials Documentation, Salesforce Secure Coding Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Secret inventory and storage mechanism are documented.
  - Source control exposure risk is addressed.
  - Rotation and revocation process is assigned.
negative_evidence:
  - Secret value appears in Apex, metadata XML, labels, or deployment scripts.
  - Custom Metadata contains API keys.
  - Token rotation is not planned.
examples:
  compliant: OAuth client secret is managed by External Credential configuration and rotated by Platform Engineering.
  non_compliant: Client secret is committed in a Custom Metadata record for deployment convenience.
