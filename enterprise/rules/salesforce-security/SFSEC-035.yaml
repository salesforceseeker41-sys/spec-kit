id: SFSEC-035
title: Validate Server-Side Inputs
category: Salesforce Security
description: Apex, Flow, and integration entry points must validate and canonicalize untrusted input before using it in queries, DML, callouts, or business decisions.
rationale: Client-side validation can be bypassed and untrusted input can cause injection, data corruption, or unauthorized behavior.
severity: warning
default_enabled: true
applies_to: [specification, plan, apex, flow, integration]
keywords: [input validation, canonicalization, injection, untrusted input, server-side validation]
recommendation: Validate type, range, format, ownership, allowed values, and record scope on the server side.
references: [Salesforce Secure Coding Guide, Salesforce Apex Developer Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Input sources are identified.
  - Server-side validation rules are documented.
  - Invalid input handling is described.
negative_evidence:
  - Design relies only on LWC required fields.
  - Apex trusts record IDs or field values from the client.
  - Integration accepts arbitrary payloads.
examples:
  compliant: Apex verifies submitted Case ID belongs to the user's accessible account before update.
  non_compliant: Apex accepts any Account ID from LWC and updates the record.
