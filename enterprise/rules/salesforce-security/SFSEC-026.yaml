id: SFSEC-026
title: Use Permission Sets Instead Of Profile Sprawl
category: Salesforce Security
description: New access must be granted through permission sets or permission set groups rather than creating or expanding broad profiles.
rationale: Permission sets support least privilege, modular access, easier review, and cleaner lifecycle management.
severity: warning
default_enabled: true
applies_to: [specification, plan, metadata, deployment]
keywords: [permission set, permission set group, profile, access management, least privilege]
recommendation: Model access as job-function permission sets and keep profiles minimal.
references: [Salesforce Permission Sets Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Required access is mapped to permission sets.
  - Profile changes are avoided or justified.
  - Assignment model is documented.
negative_evidence:
  - New profile created for a single feature.
  - Existing profile is broadened for convenience.
  - Access cannot be reviewed by capability.
examples:
  compliant: New case export capability is granted by a dedicated permission set assigned to approved users.
  non_compliant: Sales profile receives View All Data to support one dashboard.
