id: SFSEC-021
title: Govern Shield Key Management
category: Salesforce Security
description: Shield encryption key creation, rotation, destruction, and tenant secret operations must follow enterprise key management procedures.
rationale: Weak key governance can cause data exposure, failed compliance, or irreversible data loss.
severity: blocking
default_enabled: true
applies_to: [plan, deployment, operations]
keywords: [Shield key, tenant secret, key rotation, key destruction, BYOK]
recommendation: Assign key custodians, approval workflow, rotation cadence, and recovery procedures before enabling or changing encryption.
references: [Salesforce Shield Platform Encryption Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Key owner and approvers are named.
  - Rotation and backup procedures are documented.
  - Destructive key operations require explicit approval.
negative_evidence:
  - Admins can rotate keys without governance.
  - No procedure exists for key compromise.
  - Feature assumes encryption keys are platform-only concerns.
examples:
  compliant: Shield key rotation is handled through a documented change with Security and Compliance approval.
  non_compliant: Project admin rotates tenant secret in production without impact review.
