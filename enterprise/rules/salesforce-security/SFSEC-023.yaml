id: SFSEC-023
title: Enable Audit Logging For Security-Relevant Changes
category: Salesforce Security
description: Security-relevant configuration, permission, integration, and data access changes must be auditable through Salesforce setup audit trail, field history, Shield Field Audit Trail, or approved equivalent controls.
rationale: Audit evidence is required to investigate incidents, prove compliance, and detect unauthorized changes.
severity: warning
default_enabled: true
applies_to: [specification, plan, metadata, deployment, operations]
keywords: [audit logging, setup audit trail, field history, Field Audit Trail, compliance]
recommendation: Identify which changes must be audited and configure the appropriate Salesforce or enterprise audit mechanism.
references: [Salesforce Setup Audit Trail Documentation, Salesforce Shield Field Audit Trail Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Security-relevant changes are identified.
  - Audit source and retention are documented.
  - Audit review owner is assigned.
negative_evidence:
  - Permission changes are not auditable.
  - Critical field changes have no history or audit trail.
  - Audit data retention is unspecified.
examples:
  compliant: Changes to Account risk fields are tracked with Field Audit Trail and retained per compliance policy.
  non_compliant: Admins can change integration permissions without any monitored audit process.
