id: SFSEC-014
title: Govern Connected App Policies
category: Salesforce Security
description: Connected Apps must define permitted users, IP relaxation, refresh token policy, session policy, admin approval, and certificate requirements before production use.
rationale: Connected App policy controls are a core enforcement point for API access and delegated authorization.
severity: blocking
default_enabled: true
applies_to: [specification, plan, integration, deployment, operations]
keywords: [Connected App, permitted users, IP relaxation, refresh token policy, admin approved]
recommendation: Use admin-approved users with assigned permission sets and restrictive token/session policies unless an exception is approved.
references: [Salesforce Connected Apps Documentation, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Connected App policy settings are documented.
  - Assigned users or permission sets are identified.
  - Token and IP relaxation settings are justified.
negative_evidence:
  - All users may self-authorize a production Connected App.
  - Refresh tokens never expire without approval.
  - IP restrictions are relaxed for convenience.
examples:
  compliant: Connected App is admin-approved, assigned through an integration permission set, and uses restrictive refresh token policy.
  non_compliant: Connected App allows all users to authorize and keeps refresh tokens valid until revoked.
