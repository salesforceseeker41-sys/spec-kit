id: SFSEC-016
title: Enforce Enterprise Session Security Settings
category: Salesforce Security
description: Features that introduce new apps, Experience sites, Connected Apps, or access channels must comply with enterprise session timeout, MFA, IP, and high-assurance session requirements.
rationale: Session controls reduce unauthorized access from compromised credentials, unattended sessions, or untrusted networks.
severity: warning
default_enabled: true
applies_to: [specification, plan, metadata, deployment, operations]
keywords: [session security, MFA, timeout, high assurance, IP restrictions]
recommendation: Document session policy impact and confirm alignment with enterprise identity and access management standards.
references: [Salesforce Security Guide, Salesforce Identity Documentation]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Access channel and user population are identified.
  - Session timeout and MFA posture are documented.
  - High-assurance requirements are assessed.
negative_evidence:
  - New app bypasses existing session policy.
  - IP restrictions are weakened without approval.
  - MFA implications are not reviewed.
examples:
  compliant: Partner site access requires MFA for privileged actions and follows enterprise timeout policy.
  non_compliant: New Connected App relaxes IP restrictions and session policies without IAM review.
