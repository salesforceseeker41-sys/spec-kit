id: SFSEC-013
title: Limit OAuth Scopes To Least Privilege
category: Salesforce Security
description: Connected Apps must request only the OAuth scopes required for the approved integration use case.
rationale: Broad OAuth scopes expand the impact of token compromise and violate least privilege.
severity: blocking
default_enabled: true
applies_to: [specification, plan, integration, deployment]
keywords: [OAuth scope, least privilege, api, refresh_token, full, Connected App]
recommendation: Map each requested OAuth scope to a business function and remove unused or convenience scopes.
references: [Salesforce OAuth Documentation, Salesforce Connected Apps Documentation]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Requested scopes are listed.
  - Each scope has a business justification.
  - Privileged scopes receive security approval.
negative_evidence:
  - "`full` scope is requested by default."
  - Refresh token scope is used without lifecycle controls.
  - Scope list copied from another app.
examples:
  compliant: Connected App requests api and refresh_token only after documenting why offline access is needed.
  non_compliant: Connected App requests full, web, api, and refresh_token because it is easier.
