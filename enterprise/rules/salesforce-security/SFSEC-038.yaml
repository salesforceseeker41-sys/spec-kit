id: SFSEC-038
title: Protect Against Open Redirects
category: Salesforce Security
description: Salesforce pages, controllers, Flows, and integrations must not redirect users to untrusted or user-controlled URLs without validation.
rationale: Open redirects can support phishing, token theft, and user confusion.
severity: warning
default_enabled: true
applies_to: [specification, plan, apex, flow, lwc]
keywords: [open redirect, redirect URL, allowlist, phishing, returnUrl]
recommendation: Use relative URLs or allowlisted domains and validate redirect targets on the server side.
references: [Salesforce Secure Coding Guide, Salesforce Security Guide]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Redirect sources and destinations are documented.
  - Allowed destinations are constrained.
  - Invalid redirect handling is described.
negative_evidence:
  - User-provided returnUrl is trusted.
  - Redirect destination can be any external URL.
  - Validation occurs only in JavaScript.
examples:
  compliant: Controller redirects only to allowlisted internal paths after server-side validation.
  non_compliant: Flow reads a `next` parameter and redirects browser to that URL.
