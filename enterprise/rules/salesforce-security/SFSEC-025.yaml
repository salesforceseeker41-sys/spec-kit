id: SFSEC-025
title: Review Transaction Security For Risky Events
category: Salesforce Security
description: Features that introduce high-risk user actions must assess whether Salesforce Transaction Security policies are required.
rationale: Transaction Security can detect or block risky activity in near real time.
severity: advisory
default_enabled: true
applies_to: [specification, plan, operations]
keywords: [Transaction Security, policy, risky event, block, alert]
recommendation: Evaluate Transaction Security policies for sensitive exports, anomalous logins, and privileged setup or API activity.
references: [Salesforce Transaction Security Documentation, Salesforce Event Monitoring Documentation]
owner: Enterprise Salesforce Security Architecture
version: "1.0.0"
required_evidence:
  - Risky event types are identified.
  - Alert-only or block policy decision is documented.
  - Exception handling is described.
negative_evidence:
  - Sensitive exports rely only on user training.
  - No assessment for high-risk events.
  - Policy impact on business users is ignored.
examples:
  compliant: Large export of regulated records triggers a Transaction Security alert and case creation.
  non_compliant: Users can export all customer data without any event policy assessment.
