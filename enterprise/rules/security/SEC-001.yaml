id: SEC-001
title: CRUD/FLS Enforcement
category: Security
description: All Apex data access must describe how object and field permissions are enforced.
rationale: Enterprise security policy requires object and field permission enforcement before data is read or changed.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - apex
keywords:
  - CRUD
  - FLS
  - field-level security
  - security enforcement
recommendation: Explicitly describe CRUD/FLS enforcement for each Salesforce object and field touched by the feature.
references:
  - Salesforce Secure Coding Guide
owner: Platform Team
version: "1.0"
practice:
  type: salesforce_security_enforcement
  min_confidence: 0.7
required_evidence:
  - enforces CRUD and FLS
  - describes sharing model
  - checks permissions
  - uses platform security APIs
  - follows least privilege
negative_evidence:
  - without sharing without justification
  - direct data access without security checks
evidence_terms:
  enforces CRUD and FLS:
    - CRUD/FLS
    - CRUD
    - FLS
    - object permission
    - field permission
  describes sharing model:
    - sharing model
    - with sharing
    - inherited sharing
    - record access
  checks permissions:
    - permission set
    - permission checks
    - user permissions
    - object permissions
  uses platform security APIs:
    - stripInaccessible
    - WITH SECURITY_ENFORCED
    - Security.stripInaccessible
  follows least privilege:
    - least privilege
    - minimum permissions
    - permission set group
  without sharing without justification:
    - without sharing
    - bypass sharing
  direct data access without security checks:
    - direct DML without security
    - query without FLS
