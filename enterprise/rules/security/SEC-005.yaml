id: SEC-005
title: Integration Credential Protection
category: Security
description: External integrations must use managed credential patterns instead of embedded secrets.
rationale: Secrets in source code or configuration create audit, rotation, and incident response risk.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - apex
keywords:
  - Named Credential
  - External Credential
  - secret
  - credential
recommendation: Use Named Credentials or External Credentials and describe credential ownership and rotation expectations.
references:
  - Salesforce Named Credentials Documentation
owner: Platform Team
version: "1.0"
