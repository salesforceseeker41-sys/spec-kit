id: SFAPEX-060
title: Platform Event Publishing Must Be Transaction-Aware
category: Salesforce Apex
description: Apex publishing Platform Events must document publish timing and rollback expectations.
rationale: Event publication behavior affects downstream consistency and compensating actions.
severity: warning
default_enabled: true
applies_to:
  - specification
  - plan
keywords:
  - Platform Events
  - Platform
  - Apex
  - plan
recommendation: Document the Apex design decision, implementation pattern, test evidence, and operational impact for this rule.
references:
  - Salesforce Apex Developer Guide
  - Salesforce Apex Enterprise Patterns
  - Salesforce Secure Coding Guide
owner: Salesforce Center of Excellence
version: "1.0.0"
rule_pack: salesforce-apex
domain: Apex
topic: Platform Events
required_evidence:
  - Apex design or implementation identifies the relevant pattern.
  - Tests or review notes prove the expected behavior.
  - Limit, security, and operational impacts are documented where applicable.
negative_evidence:
  - Design relies on single-record assumptions or undocumented behavior.
  - Implementation hides side effects or limit consumption.
  - Tests cover only the happy path or only line coverage.
examples:
  compliant: The design uses a bulk-safe Apex pattern with explicit tests and documented ownership.
  non_compliant: The implementation works for one record in manual testing but has no bulk, limit, or failure evidence.
