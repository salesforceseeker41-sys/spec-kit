id: SFINT-001
title: Use Named Credentials For Authenticated Callouts
category: Salesforce Integration
description: Authenticated Salesforce callouts must use Named Credentials or External Credentials instead of credentials stored in code, metadata, labels, or settings.
rationale: Managed credentials centralize endpoint authentication, reduce secret exposure, and support credential rotation.
severity: blocking
default_enabled: true
applies_to: [specification, plan, apex, flow, integration, deployment]
keywords: [Named Credentials, External Credentials, authentication, callout]
recommendation: Document the Named Credential, authentication protocol, principal model, endpoint ownership, and rotation owner.
references: [Salesforce Named Credentials Documentation, Salesforce External Credentials Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Named Credentials
required_evidence:
  - Named Credential or External Credential is identified.
  - Authentication method and principal model are documented.
  - Secret rotation and endpoint ownership are assigned.
negative_evidence:
  - Credentials are stored in Apex, Custom Metadata, labels, or custom settings.
  - Authorization headers are assembled from plain text secrets.
  - Integration uses a shared human user password.
examples:
  compliant: Apex calls callout:Billing_API and authentication is managed by an External Credential owned by Platform Engineering.
  non_compliant: Apex reads an API key from Custom Metadata and adds it to the Authorization header.
