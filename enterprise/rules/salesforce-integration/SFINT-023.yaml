id: SFINT-023
title: Middleware Transformations Must Be Governed
category: Salesforce Integration
description: Middleware mapping, enrichment, filtering, and orchestration logic must be documented and owned.
rationale: Middleware can hide business rules outside Salesforce and create untraceable behavior changes.
severity: warning
default_enabled: true
applies_to: [specification, plan, integration, deployment]
keywords: [middleware, transformation, mapping, orchestration]
recommendation: Treat middleware logic as governed implementation with versioned mappings, tests, and release notes.
references: [Salesforce Integration Patterns, Enterprise Governance Constitution]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Middleware
required_evidence:
  - Field mappings and transformation rules are documented.
  - Ownership and change review are defined.
  - Regression tests cover mappings.
negative_evidence:
  - Middleware applies undocumented business rules.
  - Mapping changes are made directly in production.
  - Salesforce and middleware teams disagree on field semantics.
examples:
  compliant: Customer status mapping is versioned in middleware repo and reviewed with Salesforce product owner.
  non_compliant: Middleware silently changes status values before sending them to Salesforce.
