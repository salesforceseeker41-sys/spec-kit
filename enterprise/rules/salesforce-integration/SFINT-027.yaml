id: SFINT-027
title: Idempotency State Must Be Durable
category: Salesforce Integration
description: Idempotency state must be stored durably when retries or replays can occur across transactions.
rationale: In-memory state is lost between asynchronous retries, platform restarts, and middleware replays.
severity: warning
default_enabled: true
applies_to: [plan, apex, integration]
keywords: [idempotency, durable state, replay, transaction]
recommendation: Store processed keys or operation state in Salesforce, middleware, or the target system with retention aligned to retry windows.
references: [Salesforce Integration Patterns, Salesforce Apex Developer Guide]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Idempotency
required_evidence:
  - Durable state location is identified.
  - Retention period matches retry and replay windows.
  - Cleanup process is documented.
negative_evidence:
  - Static variables are used for duplicate prevention.
  - Idempotency record retention is shorter than replay window.
  - Cleanup deletes keys still needed for retries.
examples:
  compliant: Processed external message IDs are stored for 30 days in an integration ledger object.
  non_compliant: Apex static set prevents duplicates only within the current transaction.
