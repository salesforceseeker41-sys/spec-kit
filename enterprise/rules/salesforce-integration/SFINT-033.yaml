id: SFINT-033
title: Callout Timeouts Must Be Explicit
category: Salesforce Integration
description: Salesforce callouts must define explicit timeout values aligned to user experience, async processing, and downstream service behavior.
rationale: Default or excessive timeouts can consume transactions, degrade UX, and create limit failures.
severity: warning
default_enabled: true
applies_to: [plan, apex, flow, integration]
keywords: [timeout, callout, latency, Apex]
recommendation: Set timeout values intentionally and document why they fit the use case.
references: [Salesforce Apex Callouts Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Timeout
required_evidence:
  - Timeout values are documented.
  - User-facing and async use cases are distinguished.
  - Downstream service SLA is considered.
negative_evidence:
  - Code relies on default timeout without review.
  - Synchronous UI waits on slow downstream operation.
  - Timeout exceeds business need.
examples:
  compliant: User-facing tax estimate callout times out quickly and offers retry while batch reconciliation uses longer async timeout.
  non_compliant: Screen action waits synchronously for a long-running ERP operation.
