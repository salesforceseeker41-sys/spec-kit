id: SFINT-015
title: Platform Event Consumers Must Be Idempotent
category: Salesforce Integration
description: Platform Event consumers must tolerate duplicate, replayed, delayed, or out-of-order event delivery.
rationale: Event-driven systems provide resilient delivery, not exactly-once business processing.
severity: blocking
default_enabled: true
applies_to: [plan, apex, integration, operations]
keywords: [Platform Events, idempotency, replay, duplicate]
recommendation: Use business keys, replay IDs, processed-event records, or idempotency tokens to prevent duplicate side effects.
references: [Salesforce Platform Events Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Platform Events
required_evidence:
  - Idempotency key or duplicate detection strategy is documented.
  - Replay behavior is tested.
  - Out-of-order handling is described.
negative_evidence:
  - Event processing inserts records blindly.
  - Replay creates duplicate downstream requests.
  - Consumer assumes events arrive exactly once and in order.
examples:
  compliant: Consumer stores OrderId plus EventType as processed key before calling fulfillment.
  non_compliant: Subscriber creates a shipment every time an Order_Submitted__e event is received.
