id: SFINT-043
title: Integration Log Retention Must Be Defined
category: Salesforce Integration
description: Integration logs must have retention, archival, access, and deletion policies aligned to business and compliance needs.
rationale: Logs need to be available for investigation without retaining sensitive operational data indefinitely.
severity: advisory
default_enabled: true
applies_to: [plan, integration, operations]
keywords: [logging, retention, archive, deletion]
recommendation: Define retention periods by log type and align them with incident, audit, and privacy requirements.
references: [Salesforce Security Guide, Salesforce Event Monitoring Documentation]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Logging
required_evidence:
  - Retention period is documented.
  - Access model is defined.
  - Deletion or archival process is assigned.
negative_evidence:
  - Logs are retained forever by default.
  - Support logs are accessible to broad user groups.
  - No archival owner exists.
examples:
  compliant: Integration exception records retain safe diagnostics for 180 days and archive summaries for audit.
  non_compliant: Full payload logs remain indefinitely in a custom object accessible to all admins.
