id: SFINT-020
title: CDC Consumers Must Be Idempotent
category: Salesforce Integration
description: CDC consumers must process create, update, delete, undelete, and gap recovery events idempotently.
rationale: CDC events may be replayed and downstream writes must not duplicate or corrupt state.
severity: blocking
default_enabled: true
applies_to: [plan, integration, operations]
keywords: [CDC, idempotency, replay, change event]
recommendation: Use record ID, commit number, replay ID, or source-system version to detect already-applied changes.
references: [Salesforce Change Data Capture Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: CDC
required_evidence:
  - Idempotency approach is documented.
  - Delete and undelete behavior is defined.
  - Replay processing is tested.
negative_evidence:
  - Replay applies duplicate downstream updates.
  - Delete events are ignored without business decision.
  - Consumer cannot distinguish old and new changes.
examples:
  compliant: Consumer applies only changes newer than the downstream stored commit timestamp.
  non_compliant: Every CDC event creates a new downstream customer row.
