id: SFINT-005
title: Version REST API Contracts
category: Salesforce Integration
description: REST integrations must define and version request schemas, response schemas, error schemas, and compatibility expectations.
rationale: Versioned contracts prevent breaking changes between Salesforce and upstream or downstream systems.
severity: blocking
default_enabled: true
applies_to: [specification, plan, apex, integration]
keywords: [REST, API contract, versioning, schema]
recommendation: Publish contract documentation with version, field semantics, required fields, optional fields, and deprecation rules.
references: [Salesforce REST API Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: REST
required_evidence:
  - Request and response schemas are documented.
  - API version and compatibility policy are stated.
  - Error response structure is defined.
negative_evidence:
  - Payload shape is inferred from sample JSON only.
  - Breaking field changes are planned without versioning.
  - Error format differs by failure path.
examples:
  compliant: Customer sync REST contract defines v1 request, response, error schema, and additive change policy.
  non_compliant: Middleware posts whatever fields are available and Salesforce parses them opportunistically.
