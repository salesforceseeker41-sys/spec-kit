id: SFINT-034
title: Timeout Handling Must Be User And Operations Safe
category: Salesforce Integration
description: Timeout behavior must define user feedback, retry eligibility, idempotency, and operational logging.
rationale: Timeout does not prove whether the remote system processed the request, so recovery must be careful.
severity: blocking
default_enabled: true
applies_to: [plan, apex, integration, operations]
keywords: [timeout, recovery, idempotency, user feedback]
recommendation: Treat timeout outcomes as unknown state for write operations and reconcile before retrying when needed.
references: [Salesforce Integration Patterns, Salesforce Apex Callouts Documentation]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Timeout
required_evidence:
  - Timeout outcome handling is documented.
  - Unknown completion state is addressed.
  - User or support message is safe and actionable.
negative_evidence:
  - Timeout is treated as definite failure for write operation.
  - Retry after timeout can duplicate downstream side effects.
  - Timeout response exposes internal details.
examples:
  compliant: Payment timeout creates pending reconciliation and checks provider status before resubmission.
  non_compliant: Payment timeout immediately submits a second payment request.
