id: SFINT-016
title: Platform Event Failures Must Be Observable
category: Salesforce Integration
description: Platform Event publishing and subscription failures must be logged, monitored, and recoverable.
rationale: Asynchronous failures are easy to miss without explicit observability and recovery ownership.
severity: warning
default_enabled: true
applies_to: [plan, apex, integration, operations]
keywords: [Platform Events, monitoring, subscriber failure, recovery]
recommendation: Define failure logging, replay or dead-letter approach, alert thresholds, and owner response procedure.
references: [Salesforce Platform Events Documentation, Salesforce Event Monitoring Documentation]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Platform Events
required_evidence:
  - Failure modes are documented.
  - Monitoring and alerting are assigned.
  - Replay or remediation procedure exists.
negative_evidence:
  - Subscriber failures rely on manual discovery.
  - No owner tracks event backlog or failures.
  - Failed events cannot be replayed or reconstructed.
examples:
  compliant: Failed consumer processing records an error object and alerts the integration support queue.
  non_compliant: Subscriber catches exceptions and drops failed events.
