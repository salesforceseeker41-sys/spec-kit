id: SFINT-038
title: Integration Errors Must Be Recoverable
category: Salesforce Integration
description: Integration failures must create enough recoverable state for automated retry, user correction, support remediation, or safe abandonment.
rationale: Without recoverable state, failures lead to manual database fixes and data inconsistency.
severity: blocking
default_enabled: true
applies_to: [plan, apex, flow, integration, operations]
keywords: [error handling, recovery, remediation, failed message]
recommendation: Store safe failure context, source key, target key, status, category, and next action.
references: [Salesforce Integration Patterns, Salesforce Apex Developer Guide]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Error Handling
required_evidence:
  - Failed state storage is documented.
  - Recovery action is assigned.
  - Sensitive payload handling is addressed.
negative_evidence:
  - Failed payload is lost.
  - Manual recovery requires rerunning broad data loads.
  - Failure record lacks source identifier.
examples:
  compliant: Failed invoice sync creates Integration_Error__c with source invoice ID, category, safe message, and replay action.
  non_compliant: Apex catches exception and only writes System.debug output.
