id: SFINT-010
title: SOAP Faults Must Be Mapped To Recovery Behavior
category: Salesforce Integration
description: SOAP integrations must map expected SOAP faults and transport errors to retry, data correction, escalation, or terminal failure behavior.
rationale: SOAP faults often carry business-specific failure details that need different recovery actions.
severity: warning
default_enabled: true
applies_to: [plan, apex, integration, operations]
keywords: [SOAP, fault, recovery, error handling]
recommendation: Document fault codes, retry eligibility, user remediation, and support escalation paths.
references: [Salesforce Apex Web Services Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: SOAP
required_evidence:
  - Known SOAP faults are listed.
  - Each fault maps to a recovery behavior.
  - Fault handling is tested.
negative_evidence:
  - SOAP faults are treated as generic exceptions.
  - All faults are retried.
  - Fault detail is lost or overexposed.
examples:
  compliant: Validation faults create a remediation task while transient provider faults are retried with backoff.
  non_compliant: SOAP integration catches all exceptions and marks records processed.
