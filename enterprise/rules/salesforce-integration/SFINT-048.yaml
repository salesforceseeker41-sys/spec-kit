id: SFINT-048
title: Monitoring Must Cover Release Windows
category: Salesforce Integration
description: Integration releases must define pre-release baseline, post-release monitoring window, smoke checks, and rollback or mitigation triggers.
rationale: Integration defects often appear immediately after deployment or downstream contract change.
severity: warning
default_enabled: true
applies_to: [plan, deployment, operations]
keywords: [monitoring, release, smoke test, rollback]
recommendation: Monitor critical dashboards and integration logs during the release window with named owners.
references: [Salesforce Deployment Standards, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Monitoring
required_evidence:
  - Pre-release and post-release checks are documented.
  - Monitoring owner is named.
  - Rollback or mitigation triggers are defined.
negative_evidence:
  - Release has no integration smoke test.
  - No one watches error rates after deployment.
  - Rollback decision criteria are unclear.
examples:
  compliant: Release plan includes ERP sync smoke test, dashboard watch for two hours, and rollback threshold.
  non_compliant: Integration mapping deploys Friday evening with no post-release monitoring owner.
