id: SFINT-045
title: Critical Integrations Must Have Health Monitoring
category: Salesforce Integration
description: Critical integrations must define health checks, availability indicators, error rates, latency, backlog, and throughput monitoring.
rationale: Integration health must be visible before users report broken business processes.
severity: warning
default_enabled: true
applies_to: [specification, plan, integration, operations]
keywords: [monitoring, health check, latency, error rate]
recommendation: Create dashboards and alerts for business and technical health indicators.
references: [Salesforce Event Monitoring Documentation, Salesforce Integration Patterns]
owner: Integration Architecture
version: "1.0.0"
rule_pack: salesforce-integration
domain: Integrations
topic: Monitoring
required_evidence:
  - Critical health metrics are listed.
  - Dashboard and alert ownership is documented.
  - Business impact thresholds are defined.
negative_evidence:
  - Monitoring depends on users opening tickets.
  - Error counts are not trended.
  - Backlog or stuck messages are invisible.
examples:
  compliant: Dashboard tracks order sync success rate, latency, backlog, timeout rate, and failed messages.
  non_compliant: Integration has no monitoring because it writes errors to debug logs.
