id: GOV-002
title: No SOQL or DML in Loops
category: Governance
description: Apex designs must avoid SOQL and DML operations inside loops.
rationale: Loop-based database operations cause governor limit failures at enterprise data volumes.
severity: advisory
default_enabled: true
applies_to:
  - plan
  - apex
  - testing
keywords:
  - SOQL
  - DML
  - loop
  - governor limits
recommendation: Describe collection-based query and persistence patterns for bulk execution.
references:
  - Salesforce Apex Best Practices
owner: Platform Team
version: "1.0"
