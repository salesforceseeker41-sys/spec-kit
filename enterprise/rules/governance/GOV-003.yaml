id: GOV-003
title: Error Handling Strategy
category: Governance
description: Features must describe expected error handling behavior for user, system, and integration failures.
rationale: Consistent error handling improves supportability and reduces silent data quality issues.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - tasks
keywords:
  - error handling
  - exception
  - failure
  - recovery
recommendation: Define user-visible errors, retryable failures, fallback behavior, and escalation paths.
references:
  - Salesforce Apex Exception Statements
owner: Platform Team
version: "1.0"
