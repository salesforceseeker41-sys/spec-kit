id: TEST-002
title: Negative Test Scenarios
category: Testing
description: Tests must include expected failures and denied-access scenarios where applicable.
rationale: Negative tests prove controls and error handling work, not only happy paths.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - tasks
  - testing
keywords:
  - negative test
  - failure
  - denied
  - invalid
recommendation: Add tests for invalid input, missing permissions, integration failures, and business-rule violations.
references:
  - Enterprise Testing Standards
owner: Platform Team
version: "1.0"
