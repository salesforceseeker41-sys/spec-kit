id: TEST-001
title: Unit Test Coverage
category: Testing
description: Feature plans must identify unit tests for business logic and automation.
rationale: Unit tests provide fast evidence that core logic behaves as expected.
severity: advisory
default_enabled: true
applies_to:
  - plan
  - tasks
  - testing
keywords:
  - unit test
  - unit tests
  - test class
recommendation: Add unit test tasks for service logic, trigger handlers, flows, and utility classes.
references:
  - Salesforce Apex Testing Best Practices
owner: Platform Team
version: "1.0"
practice:
  type: salesforce_test_coverage
  min_confidence: 0.7
required_evidence:
  - includes unit tests
  - includes negative tests
  - includes bulk tests
  - includes integration tests where relevant
negative_evidence:
  - happy path only
  - no bulk tests
evidence_terms:
  includes unit tests:
    - unit test
    - unit tests
    - test class
  includes negative tests:
    - negative test
    - validation failure
    - error scenario
  includes bulk tests:
    - bulk test
    - bulk tests
    - 200 records
    - multiple records
  includes integration tests where relevant:
    - integration test
    - mock callout
    - HttpCalloutMock
  happy path only:
    - happy path only
  no bulk tests:
    - no bulk tests
