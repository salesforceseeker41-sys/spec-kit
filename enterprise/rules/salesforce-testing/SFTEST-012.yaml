id: SFTEST-012
title: Governor Limit Tests Must Avoid False Confidence
category: Salesforce Testing
description: Tests must not hide limit problems by using unrealistic setup, bypass flags, disabled automation, or simplified data relationships unless explicitly justified.
rationale: Artificially easy tests can pass while production fails under real automation and data shape.
severity: warning
default_enabled: true
applies_to: [plan, apex, flow, testing]
keywords: [Governor Limit Tests, false confidence, bypass, realistic data]
recommendation: Keep test scenarios close to production automation and document any bypasses used only for setup.
references: [Salesforce Apex Testing Best Practices, Salesforce Flow Best Practices]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Governor Limit Tests
required_evidence:
  - Test setup reflects relevant production data relationships.
  - Automation bypass use is documented and limited.
negative_evidence:
  - Tests disable the automation being evaluated.
  - Test data omits relationships that drive production load.
examples:
  compliant: Test includes related Accounts, Contacts, and Cases that trigger the same automation chain expected in production.
  non_compliant: Test bypasses all triggers and then claims trigger logic is limit-safe.
