id: SFTEST-005
title: Bulk Tests Required For Triggered Automation
category: Salesforce Testing
description: Apex triggers, record-triggered Flows, invocable actions, and object automation must include tests using multiple records and representative bulk sizes.
rationale: Salesforce automation executes in bulk during imports, integrations, API updates, and data maintenance.
severity: blocking
default_enabled: true
applies_to: [plan, apex, flow, testing]
keywords: [Bulk Tests, trigger, record-triggered Flow, multiple records]
recommendation: Test automation with collections of records, including mixed qualifying and non-qualifying records.
references: [Salesforce Apex Testing Best Practices, Salesforce Flow Best Practices]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Bulk Tests
required_evidence:
  - Bulk test scenario is included for triggered automation.
  - Test includes more than one record and mixed conditions where relevant.
negative_evidence:
  - Tests create only one record.
  - Bulk behavior is assumed from manual UI testing.
examples:
  compliant: Test updates 200 Contacts with mixed regions and asserts only eligible records are changed.
  non_compliant: Trigger test inserts one Contact and assumes data loader behavior is safe.
