id: SFTEST-019
title: Code Coverage Must Not Be The Only Quality Gate
category: Salesforce Testing
description: Code coverage thresholds must be supplemented with assertions, scenario coverage, negative tests, security tests, and bulk tests.
rationale: Salesforce coverage is necessary for deployment but insufficient as a quality measure.
severity: warning
default_enabled: true
applies_to: [plan, apex, flow, testing, deployment]
keywords: [Code Coverage, quality gate, assertions, scenario coverage]
recommendation: Use coverage as a baseline and require evidence that important behavior and risks are tested.
references: [Salesforce Apex Testing Best Practices, Salesforce Deployment Documentation]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Code Coverage
required_evidence:
  - Test plan includes behavior, risk, and scenario coverage.
  - Coverage report is paired with meaningful assertions.
negative_evidence:
  - Tests are written only to reach deployment threshold.
  - Covered code has no asserted outcomes.
examples:
  compliant: Release gate requires coverage threshold plus bulk, negative, and security scenario evidence.
  non_compliant: Team adds no-op tests solely to reach 75 percent coverage.
