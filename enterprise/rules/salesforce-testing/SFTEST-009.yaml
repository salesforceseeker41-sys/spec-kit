id: SFTEST-009
title: Integration Tests Must Validate Contracts
category: Salesforce Testing
description: Integration tests must validate request schema, response schema, required fields, error schema, and version compatibility.
rationale: Contract drift between Salesforce and external systems causes production failures even when unit tests pass.
severity: warning
default_enabled: true
applies_to: [plan, apex, flow, integration, testing]
keywords: [Integration Tests, contract, schema, API]
recommendation: Use mocks, contract fixtures, sandbox endpoints, or provider tests to prove integration compatibility.
references: [Salesforce Integration Patterns, Salesforce Apex Testing Best Practices]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Integration Tests
required_evidence:
  - Integration contract fields and errors are tested.
  - Version compatibility is validated.
negative_evidence:
  - Test validates only that a callout method was invoked.
  - Contract schema is inferred from production behavior.
examples:
  compliant: Test fixture validates required billing response fields and maps provider error codes.
  non_compliant: Test mock returns a minimal success string unrelated to the real API contract.
