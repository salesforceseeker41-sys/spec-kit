id: SFTEST-017
title: Callouts Must Be Mocked
category: Salesforce Testing
description: Apex tests for HTTP or SOAP callouts must use approved mocks such as HttpCalloutMock, WebServiceMock, injected clients, or equivalent test boundaries.
rationale: Salesforce tests cannot depend on live external systems and must prove callout behavior deterministically.
severity: blocking
default_enabled: true
applies_to: [plan, apex, integration, testing]
keywords: [Mocking, HttpCalloutMock, WebServiceMock, callout]
recommendation: Mock success, failure, timeout-like, malformed, and retryable responses where relevant.
references: [Salesforce Apex Testing Best Practices, Salesforce Apex Callouts Documentation]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Mocking
required_evidence:
  - Callout tests use approved mock mechanisms.
  - Mocks represent realistic contracts and error responses.
negative_evidence:
  - Test depends on a real external endpoint.
  - Mock returns unrealistic placeholder payload only.
examples:
  compliant: HttpCalloutMock returns provider success, validation error, and throttling fixtures.
  non_compliant: Test skips callout behavior because the external system is unavailable in CI.
