id: SFTEST-006
title: Bulk Tests Must Prove No Duplicate Side Effects
category: Salesforce Testing
description: Bulk tests must verify that automation does not create duplicate tasks, events, messages, child records, or external requests.
rationale: Duplicate side effects are a common enterprise defect when single-record logic is scaled to bulk execution.
severity: warning
default_enabled: true
applies_to: [plan, apex, flow, integration, testing]
keywords: [Bulk Tests, duplicate side effects, idempotency]
recommendation: Assert record counts and side-effect uniqueness after bulk processing and repeated execution where relevant.
references: [Salesforce Apex Testing Best Practices, Salesforce Integration Patterns]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Bulk Tests
required_evidence:
  - Bulk test asserts exact side-effect counts.
  - Duplicate prevention is tested for repeated or mixed inputs.
negative_evidence:
  - Test only checks that processing completed.
  - Duplicate tasks or events are not asserted.
examples:
  compliant: Bulk Case escalation test asserts one escalation task per eligible Case and no duplicate tasks after rerun.
  non_compliant: Test verifies no exception but never checks how many tasks were created.
