id: SFTEST-004
title: Flow Tests Must Cover Fault And Decision Paths
category: Salesforce Testing
description: Flow tests must cover important decisions, validation failures, no-match branches, and fault paths for data-changing or integration behavior.
rationale: Declarative automation often fails in branches that are not exercised by the default happy path.
severity: warning
default_enabled: true
applies_to: [plan, flow, testing]
keywords: [Flow Tests, fault path, decision, negative path]
recommendation: Include test scenarios for decision branches and fault handling, especially where the Flow writes data or calls Apex or external services.
references: [Salesforce Flow Builder Documentation, Salesforce Flow Best Practices]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Flow Tests
required_evidence:
  - Decision and fault paths are identified.
  - Tests or documented validation prove branch behavior.
negative_evidence:
  - Fault connectors exist but are never tested.
  - Only the default decision branch is validated.
examples:
  compliant: Flow validation covers eligible, ineligible, missing-data, and failed-update branches.
  non_compliant: Flow test covers only the path where all data is present and update succeeds.
