id: SFTEST-008
title: Security Tests Must Prove Denied Paths
category: Salesforce Testing
description: Tests must prove that unauthorized users cannot perform restricted operations or access restricted data.
rationale: Positive permission tests are incomplete without proving access is denied when it should be.
severity: blocking
default_enabled: true
applies_to: [plan, apex, flow, integration, testing]
keywords: [Security Tests, denied path, CRUD, FLS, sharing]
recommendation: Include negative authorization tests for restricted objects, fields, records, Apex actions, Flows, and integration operations.
references: [Salesforce Secure Coding Guide, Salesforce Security Guide]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Security Tests
required_evidence:
  - Denied access scenarios are listed.
  - Tests assert failure, stripped fields, or no data returned.
negative_evidence:
  - Test proves only that privileged users succeed.
  - Restricted field or record access is not tested.
examples:
  compliant: Test verifies user without Case_Edit permission cannot update escalation fields.
  non_compliant: Test verifies only that support manager can update escalation fields.
