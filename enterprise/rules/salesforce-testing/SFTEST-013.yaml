id: SFTEST-013
title: Tests Must Be Isolated From Org Data
category: Salesforce Testing
description: Salesforce tests must create their own records and avoid `SeeAllData=true` except for approved platform metadata cases.
rationale: Org-data dependencies make tests brittle, non-portable, and unsafe across environments.
severity: blocking
default_enabled: true
applies_to: [plan, apex, testing]
keywords: [Test Isolation, SeeAllData, org data, test data]
recommendation: Use factories and setup methods to create required records, users, and relationships inside the test.
references: [Salesforce Apex Testing Best Practices, Salesforce Apex Developer Guide]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Test Isolation
required_evidence:
  - Tests create required business data.
  - Any SeeAllData usage is justified and approved.
negative_evidence:
  - Tests query existing Accounts, Users, or configuration records by name.
  - SeeAllData is used for convenience.
examples:
  compliant: Test creates Account, Contact, Product, and required custom metadata fixture before execution.
  non_compliant: Test queries the first active Account in the org.
