id: SFTEST-018
title: Mocks Must Preserve Contract Semantics
category: Salesforce Testing
description: Mocks and stubs must reflect real method contracts, payload schemas, status codes, exceptions, and side effects closely enough to catch integration or boundary defects.
rationale: Over-simplified mocks create false confidence and miss production incompatibilities.
severity: warning
default_enabled: true
applies_to: [plan, apex, integration, testing]
keywords: [Mocking, stubs, contract, fixtures]
recommendation: Use versioned fixtures and contract-aware mocks instead of generic success responses.
references: [Salesforce Apex Testing Best Practices, Salesforce Integration Patterns]
owner: Quality Engineering
version: "1.0.0"
rule_pack: salesforce-testing
domain: Testing
topic: Mocking
required_evidence:
  - Mock fixture matches documented contract.
  - Tests cover relevant response variants.
negative_evidence:
  - Mock always returns an empty success response.
  - Mock ignores request body and headers when they matter.
examples:
  compliant: Mock validates outbound request fields and returns versioned API fixture.
  non_compliant: Mock returns `{success:true}` for every request regardless of contract.
