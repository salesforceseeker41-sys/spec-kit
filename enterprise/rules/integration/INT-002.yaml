id: INT-002
title: Integration Reliability
category: Integration
description: External integrations must describe reliability behavior for callouts and asynchronous recovery.
rationale: Integration failures should be observable, retryable where safe, and idempotent to avoid duplicate business effects.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - tasks
keywords:
  - retry
  - timeout
  - idempotency
  - logging
recommendation: Add integration reliability evidence covering timeout handling, retry strategy, idempotency, logging, and error recovery.
references:
  - Salesforce Integration Patterns
owner: Platform Team
version: "1.1"
practice:
  type: salesforce_integration_reliability
  min_confidence: 0.7
required_evidence:
  - handles timeouts
  - defines retry strategy
  - ensures idempotency
  - includes logging
  - describes error recovery
negative_evidence:
  - no retry strategy
  - no timeout handling
evidence_terms:
  handles timeouts:
    - timeout handling
    - callout timeout
    - timeout strategy
  defines retry strategy:
    - retry strategy
    - retry policy
    - exponential backoff
  ensures idempotency:
    - idempotency
    - idempotent
    - idempotency key
  includes logging:
    - logging
    - observability
    - integration log
  describes error recovery:
    - error recovery
    - dead letter
    - replay
    - compensating action
  no retry strategy:
    - no retry
    - no retry strategy
  no timeout handling:
    - no timeout
    - no timeout handling
