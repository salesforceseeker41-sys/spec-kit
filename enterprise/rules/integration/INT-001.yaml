id: INT-001
title: Named Credential Usage
category: Integration
description: External Salesforce integrations must use Named Credentials or equivalent managed authentication.
rationale: Managed credentials reduce secret exposure and centralize endpoint authentication.
severity: advisory
default_enabled: true
applies_to:
  - specification
  - plan
  - tasks
keywords:
  - Named Credential
  - Named Credentials
  - managed authentication
recommendation: Describe the Named Credential, authentication approach, endpoint ownership, and secret rotation expectations.
references:
  - Salesforce Integration Patterns
owner: Platform Team
version: "1.1"
practice:
  type: salesforce_named_credentials
  min_confidence: 0.7
required_evidence:
  - uses named credentials
  - avoids hardcoded endpoints
  - describes authentication ownership
negative_evidence:
  - hardcoded endpoint
  - hardcoded secret
evidence_terms:
  uses named credentials:
    - Named Credential
    - Named Credentials
    - External Credential
  avoids hardcoded endpoints:
    - no hardcoded endpoint
    - endpoint configured
    - environment-specific endpoint
  describes authentication ownership:
    - authentication owner
    - secret rotation
    - managed authentication
  hardcoded endpoint:
    - hardcoded endpoint
    - endpoint in code
  hardcoded secret:
    - hardcoded secret
    - password in code
    - token in code
