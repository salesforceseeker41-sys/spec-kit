rules:
- id: ARCH-001
  title: Enterprise Architecture Alignment
  category: Architecture
  description: Feature plans must align with approved enterprise architecture patterns.
  rationale: Delivery teams should apply enterprise architecture, not redefine it in feature artifacts.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  keywords:
  - architecture
  - pattern
  - standard
  - alignment
  recommendation: Reference applicable enterprise architecture patterns and document exceptions explicitly.
  references:
  - Enterprise Architecture Principles
  owner: Platform Team
  version: '1.0'
- id: ARCH-002
  title: System Boundary Definition
  category: Architecture
  description: Designs must identify system boundaries and ownership for data, processes, and integrations.
  rationale: Clear boundaries reduce duplicate ownership and integration ambiguity.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  keywords:
  - boundary
  - ownership
  - system of record
  - integration
  recommendation: Define systems involved, source of truth, ownership, and responsibility for each boundary.
  references:
  - Enterprise Integration Principles
  owner: Platform Team
  version: '1.0'
- id: ARCH-003
  title: API Contract Ownership
  category: Architecture
  description: Integration features must identify API contract ownership and compatibility expectations.
  rationale: Stable contracts prevent downstream breakage across Salesforce applications.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  keywords:
  - API
  - contract
  - version
  - compatibility
  recommendation: Document the owning team, contract version, compatibility expectations, and change process.
  references:
  - Enterprise API Governance
  owner: Platform Team
  version: '1.0'
- id: ARCH-004
  title: Event Model Consistency
  category: Architecture
  description: Event-driven designs must align with the product event model and enterprise event naming.
  rationale: Consistent event semantics improve reuse, traceability, and integration reliability.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  - apex
  keywords:
  - event
  - platform event
  - event model
  - naming
  recommendation: Identify event names, producers, consumers, payload ownership, and versioning expectations.
  references:
  - Salesforce Platform Events Documentation
  owner: Platform Team
  version: '1.0'
- id: ARCH-005
  title: Nonfunctional Requirement Traceability
  category: Architecture
  description: Plans must trace nonfunctional requirements to design choices and tasks.
  rationale: Enterprise quality attributes must remain visible through delivery.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  - tasks
  keywords:
  - nonfunctional
  - performance
  - availability
  - traceability
  recommendation: Link security, performance, reliability, and supportability requirements to design and task evidence.
  references:
  - Enterprise Architecture Review Checklist
  owner: Platform Team
  version: '1.0'
- id: SFARCH-001
  title: Define Layer Responsibilities
  category: Salesforce Architecture
  description: Salesforce designs must define responsibilities for UI, application service, domain, selector, integration,
    and persistence layers.
  rationale: Layer clarity prevents business logic from spreading across triggers, controllers, Flows, and utility classes.
  severity: warning
  default_enabled: true
  applies_to:
  - specification
  - plan
  keywords:
  - Layered Architecture
  - Define
  - Architecture
  - plan
  recommendation: Document the architecture decision, ownership, tradeoffs, test or review evidence, and operational impact
    for this rule.
  references:
  - Enterprise Architecture Principles
  - Salesforce Apex Enterprise Patterns
  - Salesforce Integration Patterns
  owner: Enterprise Architecture
  version: 1.0.0
  rule_pack: salesforce-architecture
  domain: Architecture
  topic: Layered Architecture
  required_evidence:
  - Architecture decision or design section identifies the relevant pattern.
  - Ownership, boundaries, and tradeoffs are documented.
  - Testing, deployment, and operational impacts are addressed where applicable.
  negative_evidence:
  - Design relies on undocumented coupling or implementation convenience.
  - Ownership, boundaries, or side effects are unclear.
  - Exceptions are taken without documented approval or expiration.
  examples:
    compliant: The design names the responsible layer, owner, dependencies, test evidence, deployment plan, and support signals.
    non_compliant: The implementation places logic wherever it is fastest with no ownership, boundary, or operational evidence.
- id: SFARCH-002
  title: Prevent Cross-Layer Shortcuts
  category: Salesforce Architecture
  description: Implementation must not bypass established layers for convenience, such as UI directly performing complex persistence
    or triggers calling integration clients directly.
  rationale: Cross-layer shortcuts create hidden coupling and make behavior hard to test and operate.
  severity: warning
  default_enabled: true
  applies_to:
  - specification
  - plan
  - apex
  - testing
  keywords:
