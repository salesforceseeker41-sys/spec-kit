- id: SFAPEX-013
  title: Bulkify Cross-Object Updates
  category: Salesforce Apex
  description: Cross-object updates must collect related records and update them in batches, not one parent or child at a
    time.
  rationale: Cross-object loops are a common source of limit failures in enterprise data volumes.
