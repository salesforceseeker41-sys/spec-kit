- id: SFAPEX-012
  title: Aggregate DML By Operation
  category: Salesforce Apex
  description: Apex must aggregate inserts, updates, upserts, deletes, and undeletes into collection-level DML operations.
  rationale: Collection-level DML reduces limit usage and makes partial success handling explicit.
