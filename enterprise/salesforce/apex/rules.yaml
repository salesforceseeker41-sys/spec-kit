- id: SFAPEX-008
  title: Keep Trigger Entry Points Thin
  category: Salesforce Apex
  description: Trigger entry points must contain orchestration only and delegate validation, domain behavior, service calls,
    and persistence.
  rationale: Thin entry points keep governor usage visible and prevent business logic from becoming untestable.
  severity: warning
  default_enabled: true
