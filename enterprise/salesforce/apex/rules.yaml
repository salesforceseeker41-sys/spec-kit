- id: SFAPEX-017
  title: Do Not Rely On Current Data Volume
  category: Salesforce Apex
  description: Apex designs must account for expected enterprise-scale volume, not only current org data size.
  rationale: Current record counts often understate future transaction and migration volume.
  severity: warning
  default_enabled: true
  applies_to:
  - specification
  - plan
  keywords:
