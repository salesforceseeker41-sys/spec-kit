- id: SFAPEX-009
  title: Process Records As Collections
  category: Salesforce Apex
  description: Apex logic must process all trigger and service inputs as collections, even when callers pass one record.
  rationale: Salesforce can invoke code with many records in one transaction, and single-record logic fails at scale.
  severity: blocking
  default_enabled: true
  applies_to:
