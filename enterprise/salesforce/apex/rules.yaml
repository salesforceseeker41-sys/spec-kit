- id: SFAPEX-006
  title: Avoid Trigger Ordering Dependencies
  category: Salesforce Apex
  description: Designs must not depend on undocumented ordering between triggers, flows, processes, and managed package automation.
  rationale: Salesforce automation ordering can change as metadata evolves and creates fragile behavior.
