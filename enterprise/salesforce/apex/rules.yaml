- id: SFAPEX-004
  title: Prevent Recursive Trigger Execution
  category: Salesforce Apex
  description: Trigger frameworks must include a recursion control strategy for re-entrant updates and cross-object automation.
  rationale: Recursive execution can exceed governor limits, duplicate work, and corrupt data.
  severity: blocking
  default_enabled: true
  applies_to:
