- id: SFAPEX-003
  title: Separate Trigger Context Methods
  category: Salesforce Apex
  description: Trigger handlers must separate before insert, before update, after insert, after update, before delete, after
    delete, and undelete behavior.
  rationale: Context separation prevents accidental DML timing issues and keeps record mutation rules clear.
  severity: warning
  default_enabled: true
  applies_to:
