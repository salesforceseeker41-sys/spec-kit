rules:
- id: APEX-001
  title: Apex Service Layer
  category: Apex
  description: Complex Apex behavior should be organized behind service classes with clear responsibilities.
  rationale: A service layer improves reuse, testability, and separation from triggers or controllers.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - apex
  keywords:
  - service class
  - service layer
  - separation of concerns
  recommendation: Identify service classes and responsibilities for business logic.
  references:
  - Salesforce Apex Enterprise Patterns
  owner: Platform Team
  version: '1.0'
  practice:
    type: salesforce_apex_bulkification
    min_confidence: 0.7
  required_evidence:
  - processes records in collections
  - avoids SOQL inside loops
  - avoids DML inside loops
  - uses maps or sets for lookups
  - includes bulk test scenarios
  negative_evidence:
  - one record at a time
  - SOQL inside loop
  - DML inside loop
  - future method from trigger
  evidence_terms:
    processes records in collections:
    - bulk records
    - collections
    - List<
    - Set<
    - process all records
    - bulk-safe
    avoids SOQL inside loops:
    - query outside loop
    - no SOQL in loop
    - no SOQL inside loop
    - avoid SOQL inside loops
    avoids DML inside loops:
    - DML outside loop
    - no DML in loop
    - no DML inside loop
    - avoid DML inside loops
    - bulk DML
    uses maps or sets for lookups:
    - Map<
    - Set<
    - maps for lookups
    - sets for deduplication
    - key lookup
    includes bulk test scenarios:
    - bulk test
    - bulk tests
    - 200 records
    - multiple records
    one record at a time:
    - one record at a time
    - single record only
    SOQL inside loop:
    - SOQL inside loop
    - query inside loop
    DML inside loop:
    - DML inside loop
    - insert inside loop
    - update inside loop
    future method from trigger:
    - future method from trigger
    - '@future from trigger'
- id: APEX-002
  title: Selector Query Encapsulation
  category: Apex
  description: Reusable query logic should be encapsulated rather than duplicated across Apex classes.
  rationale: Query encapsulation improves consistency, field access review, and limit management.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - apex
  keywords:
  - selector
  - query
  - SOQL
  - reuse
  recommendation: Document selector or repository classes for repeated object queries.
  references:
  - Salesforce Apex Enterprise Patterns
  owner: Platform Team
  version: '1.0'
- id: APEX-003
  title: Apex Test Data Isolation
  category: Apex
  description: Apex tests must create isolated test data and avoid relying on org data.
  rationale: Isolated tests remain stable across sandboxes, packages, and production deployments.
  severity: advisory
  default_enabled: true
  applies_to:
  - apex
  - testing
  keywords:
  - test data
  - SeeAllData
  - factory
  - isolation
  recommendation: Use test data factories and avoid SeeAllData unless a documented exception exists.
  references:
  - Salesforce Apex Testing Best Practices
  owner: Platform Team
  version: '1.0'
- id: APEX-004
  title: Apex Integration Callout Isolation
  category: Apex
  description: Apex callouts must be isolated behind integration services and tested with mocks.
  rationale: Isolating callouts improves retry behavior, testability, and credential management.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - apex
  - testing
  keywords:
  - callout
  - mock
  - integration service
  - HttpCalloutMock
  recommendation: Identify callout services, mock strategy, timeout behavior, and retry ownership.
  references:
  - Salesforce Apex Callouts
  owner: Platform Team
  version: '1.0'
- id: APEX-005
  title: Apex Limit-Safe Collections
  category: Apex
  description: Apex implementation plans must use maps, sets, and lists to avoid repeated work.
  rationale: Collection-first design supports bulk execution and reduces limit consumption.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - apex
  keywords:
  - map
  - set
  - list
  - collection
  recommendation: Describe collection usage for lookups, deduplication, and batched persistence.
  references:
  - Salesforce Apex Developer Guide
  owner: Platform Team
  version: '1.0'
- id: SFAPEX-001
  title: One Trigger Per Object
  category: Salesforce Apex
  description: Each sObject must have at most one Apex trigger that delegates to an enterprise trigger framework.
  rationale: Multiple triggers create unpredictable execution order and make behavior hard to test, govern, and operate.
  severity: blocking
  default_enabled: true
  applies_to:
  - specification
  - plan
  - apex
  - testing
  keywords:
  - Trigger Framework
  - One
  - Apex
  - apex
  recommendation: Document the Apex design decision, implementation pattern, test evidence, and operational impact for this
    rule.
  references:
  - Salesforce Apex Developer Guide
  - Salesforce Apex Enterprise Patterns
  - Salesforce Secure Coding Guide
  owner: Salesforce Center of Excellence
  version: 1.0.0
  rule_pack: salesforce-apex
  domain: Apex
  topic: Trigger Framework
  required_evidence:
  - Apex design or implementation identifies the relevant pattern.
  - Tests or review notes prove the expected behavior.
  - Limit, security, and operational impacts are documented where applicable.
  negative_evidence:
  - Design relies on single-record assumptions or undocumented behavior.
  - Implementation hides side effects or limit consumption.
  - Tests cover only the happy path or only line coverage.
  examples:
    compliant: The design uses a bulk-safe Apex pattern with explicit tests and documented ownership.
    non_compliant: The implementation works for one record in manual testing but has no bulk, limit, or failure evidence.
- id: SFAPEX-002
  title: Route Trigger Logic Through Handlers
  category: Salesforce Apex
  description: Triggers must route work to handler classes instead of containing business logic inline.
  rationale: Handler classes make trigger behavior testable, reusable, and easier to control across contexts.
  severity: warning
  default_enabled: true
  applies_to:
