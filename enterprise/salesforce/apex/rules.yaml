- id: SFAPEX-005
  title: Centralize Trigger Bypass Controls
  category: Salesforce Apex
  description: Trigger bypasses must be centrally controlled, audited, and limited to approved data loads or system operations.
  rationale: Uncontrolled bypasses allow product teams or jobs to skip required business and security rules.
  severity: blocking
  default_enabled: true
