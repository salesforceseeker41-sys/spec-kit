- id: SFAPEX-010
  title: No SOQL Inside Loops
  category: Salesforce Apex
  description: Apex must not execute SOQL inside loops over records, fields, payloads, or child collections.
  rationale: SOQL inside loops quickly exceeds governor limits and creates nonlinear performance behavior.
