rules:
- id: FLOW-001
  title: Flow Ownership and Type
  category: Flow
  description: Feature plans must identify flow type, owner, and invocation path for declarative automation.
  rationale: Flow ownership prevents unmanaged automation sprawl and unclear support paths.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  - flow
  keywords:
  - flow
  - record-triggered flow
  - screen flow
  - owner
  recommendation: Document flow type, entry condition, owner, and support responsibility.
  references:
  - Salesforce Flow Best Practices
  owner: Platform Team
  version: '1.0'
  practice:
    type: salesforce_flow_maintainability
    min_confidence: 0.7
  required_evidence:
  - explains flow ownership
  - avoids excessive automation overlap
  - handles errors
  - includes flow tests
  negative_evidence:
  - duplicate automation
  - no fault path
  evidence_terms:
    explains flow ownership:
    - flow owner
    - automation owner
    - flow responsibility
    avoids excessive automation overlap:
    - automation overlap
    - single automation path
    - avoids duplicate automation
    handles errors:
    - fault path
    - error handling
    - fault connector
    includes flow tests:
    - flow test
    - flow tests
    - test scenario
    duplicate automation:
    - duplicate automation
    - multiple flows on same object
    no fault path:
    - no fault path
    - missing fault path
- id: FLOW-002
  title: Flow Entry Criteria
  category: Flow
  description: Record-triggered flows must have explicit entry criteria and recursion considerations.
  rationale: Precise entry criteria reduces unintended automation and performance issues.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - flow
  keywords:
  - entry criteria
  - recursion
  - trigger
  - flow
  recommendation: Define trigger conditions, recursion risk, and how repeated updates are avoided.
  references:
  - Salesforce Record-Triggered Flow Guidance
  owner: Platform Team
  version: '1.0'
- id: FLOW-003
  title: Flow Fault Paths
  category: Flow
  description: Flows must define fault handling for data operations, callouts, and subflow failures.
  rationale: Unhandled flow faults create poor user experiences and difficult support cases.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - flow
  - testing
  keywords:
  - fault path
  - error handling
  - flow error
  - exception
  recommendation: Document fault paths, user messaging, logging, and escalation behavior.
  references:
  - Salesforce Flow Error Handling
  owner: Platform Team
  version: '1.0'
- id: FLOW-004
  title: Flow Bulk Behavior
  category: Flow
  description: Flow automation must account for bulk updates and high-volume data changes.
  rationale: Flows can hit limits or create contention when bulk behavior is not considered.
  severity: advisory
  default_enabled: true
  applies_to:
  - plan
  - flow
  - testing
  keywords:
  - bulk
  - collection
  - governor limits
  - flow
  recommendation: Describe expected bulk scenarios and how the flow avoids per-record expensive work.
  references:
  - Salesforce Flow Limits
  owner: Platform Team
  version: '1.0'
- id: FLOW-005
  title: Flow and Apex Boundary
  category: Flow
  description: Designs must explain when logic belongs in Flow versus Apex.
  rationale: Clear ownership avoids fragmented business logic and untestable automation.
  severity: advisory
  default_enabled: true
  applies_to:
  - specification
  - plan
  - flow
  - apex
  keywords:
  - flow
  - apex
  - boundary
  - invocable
  recommendation: Document why the selected automation tool is appropriate and where handoff boundaries exist.
  references:
  - Enterprise Automation Strategy
  owner: Platform Team
  version: '1.0'
- id: SFFLOW-001
  title: Screen Flow Must Have A Business Process Owner
  category: Salesforce Flow
  description: Every Screen Flow must identify the business process owner, support owner, target user population, and expected
    usage context.
  rationale: Screen Flows encode business process behavior and need clear ownership for change, support, and defect triage.
  severity: warning
  default_enabled: true
  applies_to:
  - specification
  - plan
  - flow
  - testing
  keywords:
  - Screen Flow
  - Screen
  - Flow
  - flow
  recommendation: Document the Flow design decision, ownership, test evidence, activation plan, and operational impact for
    this rule.
  references:
  - Salesforce Flow Best Practices
  - Salesforce Flow Builder Documentation
  - Salesforce Order of Execution Documentation
  owner: Salesforce Center of Excellence
  version: 1.0.0
  rule_pack: salesforce-flow
  domain: Flow
  topic: Screen Flow
  required_evidence:
  - Flow type, owner, and invocation path are documented.
  - Tests or review notes prove the expected behavior.
  - Error, limit, activation, and operational impacts are documented where applicable.
  negative_evidence:
  - Design relies on undocumented automation order or single-record assumptions.
  - Flow hides failures, side effects, or ownership.
  - Tests cover only the happy path or manual click-through behavior.
  examples:
    compliant: The Flow has clear ownership, selective criteria, fault handling, test evidence, and a release-controlled activation
      plan.
    non_compliant: The Flow is activated from Setup after manual testing with no owner, fault path, bulk evidence, or rollback
      plan.
- id: SFFLOW-002
  title: Screen Flow Must Validate User Input
  category: Salesforce Flow
  description: Screen Flows must validate required fields, formats, ranges, and record ownership before committing data.
  rationale: Client-side or screen-level guidance is not enough to prevent invalid or unauthorized data changes.
